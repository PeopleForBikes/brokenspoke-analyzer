name: Bug report
description: Report a bug or unexpected behavior.
title: "[Bug] "
labels:
  - kind/bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please include enough detail for us to reproduce or understand the issue.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Provide a short summary of the problem.
      placeholder: e.g. Analysis fails for city X
    validations:
      required: true

  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      description: What is happening right now?
      placeholder: Describe the unexpected behavior.
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
      placeholder: Describe the intended behavior.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the issue.
      placeholder: |
        1. Step one
        2. Step two
        3. Step three
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this issue important? What are you trying to accomplish?
      placeholder: Add any relevant context.

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include relevant version, OS, browser, or command details.
      placeholder: e.g. Python 3.13, macOS 14, uv run bna ...

  - type: input
    id: related_issue
    attributes:
      label: Related issue or PR
      description: Link an existing issue or pull request if relevant.
      placeholder: e.g. #123 or owner/repo#123
