name: Bug report
description: Report a bug or unexpected behavior.
labels:
  - kind/bug
type: Bug
body:
  - type: markdown
    attributes:
      value: Provide a short summary of your problem.

  - type: input
    id: version
    attributes:
      label: Version
      description: Provide the version of the software where the issue occurs.
      placeholder: e.g. 3.1.1 ($ uv run bna --version) or 'main' if using the latest development version.
    validations:
      required: true

  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      description: What is happening right now?
      placeholder: Describe the unexpected behavior.

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
      placeholder: Describe the intended behavior.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the issue.
      placeholder: |
        1. Step one
        2. Step two
        3. Step three
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include relevant versions, OS, and commit details.
      placeholder: |
        - OS: e.g. macOS 13.4.1
        - Python: e.g. 3.11.4 ($ python --version)
        - Commit: e.g. 1234567 ($ git log -1 --pretty=format:"%h %s")
    validations:
      required: true
