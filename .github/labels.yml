---
labels:
  # Kinds.
  # Color grouping is intentional: semantically related kinds share a hue
  # (enhancement/optimization/feature = "improvements",
  # infrastructure/automation = "process/tooling").
  - name: "kind/bug"
    color: "#D73A4A"
    description: "Something isn't working"
  - name: "kind/design"
    color: "#8000FF"
    description: "Visual aspect"
  - name: "kind/docs"
    color: "#000BE0"
    description: "Document the project"
  - name: "kind/enhancement"
    color: "#A2EEEF"
    description: "Improve an existing feature"
  - name: "kind/optimization"
    color: "#A2EEEF"
    description: "Optimize an existing feature"
  - name: "kind/feature"
    color: "#A2EEEF"
    description: "New feature request"
  - name: "kind/infrastructure"
    color: "#387499"
    description: "Issue regarding the local or cloud infrastructure setup"
  - name: "kind/automation"
    color: "#387499"
    description: "Automate your tasks"
  - name: "kind/security"
    color: "#993333"
    description: "CVEs and other security flaws"

  # Feedback.
  - name: "feedback/question"
    color: "#D876E3"
    description: "Further information is requested"
  - name: "feedback/discussion"
    color: "#D876E3"
    description: "Discuss a specific aspect of the project"

  # T-shirt sizes.
  # PR-only facet: applied to pull requests to reflect actual diff size,
  # not to issues. Gradient color is a deliberate exception to the
  # one-hue-per-semantic-cluster rule used elsewhere in this file.
  - name: "size/XS"
    color: "#00FF00"
    description: "Extra small (0-9 lines of changes)"
  - name: "size/S"
    color: "#CCFF66"
    description: "Small (10-29 lines of changes)"
  - name: "size/M"
    color: "#FFFF00"
    description: "Medium (30-99 lines of changes)"
  - name: "size/L"
    color: "#FF9933"
    description: "Large (100-499 lines of changes)"
  - name: "size/XL"
    color: "#B60205"
    description: "Extra large (500-999 lines of changes)"
  - name: "size/XXL"
    color: "#8B0000"
    description: "Extra extra large (1000+ lines of changes)"

  # Experience.
  # Estimated effort for a team member already familiar with the codebase.
  - name: "exp/beginner"
    color: "#CBE4CE"
    description: "Solvable in an hour or less by someone familiar with the codebase"
  - name: "exp/intermediate"
    color: "#CBE4CE"
    description: "Solvable in half a day or less by someone familiar with the codebase"
  - name: "exp/expert"
    color: "#CBE4CE"
    description: "Takes longer than half a day, even for someone familiar with the codebase"

  # GitHub default label, kept as its exact literal name (not namespaced)
  # so it's picked up by GitHub's own "Contribute" panel and newcomer-issue
  # finder. Apply alongside exp/beginner, not instead of it.
  - name: "good first issue"
    color: "#7057FF"
    description: "Good for newcomers"

  # Statuses.
  # Issues/PRs with no status label are assumed not yet triaged.
  - name: "status/claimed"
    color: "#FBCA04"
    description: "Assigned"
  - name: "status/work-in-progress"
    color: "#FBCA04"
    description: "Actively being worked on; exempt from stale checks"
  - name: "status/help-wanted"
    color: "#008672"
    description: "Could use an extra brain"
  - name: "status/needs-info"
    color: "#008672"
    description: "Needs clarification"
  - name: "status/invalid"
    color: "#D2DAE1"
    description: "No further triaging"
  - name: "status/wontfix"
    color: "#D2DAE1"
    description: "Fix is too controversial or do not want to implement it"
  - name: "status/duplicate"
    color: "#D2DAE1"
    description: "This issue or pull request already exists"
  - name: "status/needs-careful-review"
    color: "#B60205"
    description: "Requires extra attention during review"
  - name: "status/do-not-merge"
    color: "#DC143C"
    description: "Prevents PRs with this label from being merged"

  # Bots.
  # Left unprefixed on purpose: Dependabot auto-creates and applies a label
  # literally named "dependencies" by default. Renaming it would break that
  # integration unless Dependabot's config is also updated to match.
  - name: "dependencies"
    color: "#0366d6"
    description: "Pull requests that update a dependency file"
